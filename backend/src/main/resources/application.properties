spring.config.import=optional:file:.env[.properties]
spring.application.name=api

spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

tracepilot.jwt.secret=${JWT_SECRET:7X60QC3A3ai0E7KLe7QUQMi4qSd7FEIlD2ifSkwIj8LiV+RFVTxceAbJI0/HZfvl7C864tstP7x4HU8Od94CLQ==}
tracepilot.jwt.access-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
tracepilot.jwt.refresh-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}

spring.flyway.baseline-on-migrate=true
management.otlp.metrics.export.enabled=false

tracepilot.frontend.url=${FRONTEND_URL:http://localhost:5173}
tracepilot.backend.url=${BACKEND_URL:http://localhost:8080}

spring.mail.host=://gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000