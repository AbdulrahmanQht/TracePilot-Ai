spring.config.import=optional:file:.env[.properties]
spring.application.name=api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tracepilot_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5671}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:true}

tracepilot.jwt.secret=${JWT_SECRET:7X60QC3A3ai0E7KLe7QUQMi4qSd7FEIlD2ifSkwIj8LiV+RFVTxceAbJI0/HZfvl7C864tstP7x4HU8Od94CLQ==}
tracepilot.jwt.access-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
tracepilot.jwt.refresh-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}
tracepilot.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}

spring.flyway.baseline-on-migrate=true
management.otlp.metrics.export.enabled=false

tracepilot.frontend.url=${FRONTEND_URL:http://localhost:5173}
tracepilot.backend.url=${BACKEND_URL:http://localhost:8080}
tracepilot.worker.health-url=${WORKER_HEALTH_URL:http://localhost:8001/ai-worker/v1/health}
tracepilot.jaeger.health-url=${JAEGER_HEALTH_URL:http://localhost:16686/}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

management.health.mail.enabled=false

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.mvc.async.request-timeout=600000

server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB

logging.level.root=INFO

logging.level.com.tracepilot.api=INFO

logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

logging.level.io.opentelemetry=WARN
logging.level.io.opentelemetry.exporter.logging=OFF
logging.level.io.opentelemetry.sdk.trace.export=OFF