name: tracepilot

services:
  db:
    image: postgres:latest
    container_name: tracepilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-tracepilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracepilot}
      POSTGRES_DB: ${DB_NAME:-tracepilot_db}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tracepilot} -d ${DB_NAME:-tracepilot_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:management
    container_name: tracepilot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tracepilot-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tracepilot-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    env_file:
    - ./backend/.env
    environment:
      DB_NAME: ${DB_NAME:-tracepilot_db}
      DB_USERNAME: ${DB_USERNAME:-tracepilot}
      DB_PASSWORD: ${DB_PASSWORD:-tracepilot}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-tracepilot_db}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET:-7X60QC3A3ai0E7KLe7QUQMi4qSd7FEIlD2ifSkwIj8LiV+RFVTxceAbJI0/HZfvl7C864tstP7x4HU8Od94CLQ==}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      EMAIL: ${EMAIL:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      WORKER_HEALTH_URL: http://ai-worker:8001/ai-worker/v1/health
      JAEGER_HEALTH_URL: http://jaeger:16686/
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ai-worker:
    build:
      context: ./ai-worker
    container_name: tracepilot-ai-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    env_file:
    - ./ai-worker/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ai-worker/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db-data:
