[build]
  base = "frontend"
  command = "curl -fsSL https://bun.sh/install | bash && export PATH=\"$HOME/.bun/bin:$PATH\" && bun install --frozen-lockfile && bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Belt-and-suspenders alongside public/_redirects: SPA client-side routing
# fallback so refreshing on e.g. /audits/123 doesn't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
